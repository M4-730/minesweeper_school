<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        .login-container {
            background: gray;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 400px;
            max-width: 90%;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        label {
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #333;
            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #555;
        }

        p {
            color: #ddd;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        a {
            color: white;
            font-weight: bold;
        }

        .error {
            background-color: #c0392b;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .success {
            background-color: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Iniciar sesión</h2>

        <div class="error" id="errorMsg">Usuario o contraseña incorrectos</div>
        <div class="success" id="successMsg">Cuenta creada. Ya podés iniciar sesión.</div>

        <form action="login.php" method="post">
            <label for="usuario">Usuario:</label><br>
            <input type="text" id="usuario" name="usuario" required><br><br>

            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Entrar</button>

            <p>You don't have an account?</p>
            <a href="registration.html">Register</a>
        </form>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            document.getElementById('errorMsg').style.display = 'block';
        }
        if (params.get('registered') === '1') {
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>
</html>
